name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libx11-dev \
            xorg-dev \
            pkg-config
      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          VERSION="${GITHUB_REF_NAME#v}" OUTPUT_NAME="i2tor-${GITHUB_REF_NAME#v}-linux-x86_64.AppImage" packaging/linux/build-appimage.sh
      - name: Generate release checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Import release signing key
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${RELEASE_GPG_PRIVATE_KEY}" ] || [ -z "${RELEASE_GPG_PASSPHRASE}" ]; then
            echo "Release signing secrets are not configured; skipping AppImage signing."
            exit 0
          fi
          export GNUPGHOME="$(mktemp -d)"
          echo "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - name: Sign AppImage and checksums
        env:
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${GNUPGHOME:-}" ] || [ -z "${RELEASE_GPG_KEY_ID}" ] || [ -z "${RELEASE_GPG_PASSPHRASE}" ]; then
            echo "Release signing is not configured for this run; skipping AppImage signing."
            exit 0
          fi
          cd dist
          for artifact in *.AppImage SHA256SUMS; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" --local-user "$RELEASE_GPG_KEY_ID" --armor --detach-sign "$artifact"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: i2tor-appimage
          path: |
            dist/*.AppImage
            dist/*.AppImage.asc
            dist/SHA256SUMS
            dist/SHA256SUMS.asc

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset: i2tor-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset: i2tor-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: i2tor-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.asset }} ./cmd/i2tor
      - name: Generate binary checksum
        run: |
          cd dist
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - name: Import release signing key
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${RELEASE_GPG_PRIVATE_KEY}" ] || [ -z "${RELEASE_GPG_PASSPHRASE}" ]; then
            echo "Release signing secrets are not configured; skipping binary signing setup."
            exit 0
          fi
          export GNUPGHOME="$(mktemp -d)"
          echo "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - name: Sign binary and checksum
        env:
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${GNUPGHOME:-}" ] || [ -z "${RELEASE_GPG_KEY_ID}" ] || [ -z "${RELEASE_GPG_PASSPHRASE}" ]; then
            echo "Release signing is not configured for this run; skipping binary signing."
            exit 0
          fi
          cd dist
          for artifact in "${{ matrix.asset }}" "${{ matrix.asset }}.sha256"; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" --local-user "$RELEASE_GPG_KEY_ID" --armor --detach-sign "$artifact"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.asset }}.asc
            dist/${{ matrix.asset }}.sha256.asc

  publish:
    runs-on: ubuntu-latest
    needs:
      - appimage
      - build-binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
