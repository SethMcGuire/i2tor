name: ci

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libx11-dev \
            xorg-dev \
            pkg-config
      - name: Format check
        run: |
          test -z "$(gofmt -l .)"
      - name: Unit and integration tests
        run: go test ./...
      - name: Build launcher
        run: go build ./cmd/i2tor

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Add MinGW to PATH
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Embed Windows icon
        run: |
          go install github.com/akavel/rsrc@latest
          rsrc -ico i2tor.ico -o cmd/i2tor/resource.syso
        env:
          CGO_ENABLED: "1"
      - name: Build launcher
        run: go build ./cmd/i2tor
        env:
          CGO_ENABLED: "1"
