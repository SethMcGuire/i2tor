name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Format check
        run: |
          test -z "$(gofmt -l .)"
      - name: Unit and integration tests
        run: go test ./...
      - name: Build launcher
        run: go build ./cmd/i2tor
